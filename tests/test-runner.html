<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journelyst Test Suite</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161a23;
      --surface2: #1e2430;
      --border: rgba(255,255,255,0.07);
      --accent-pass: #4fffb0;
      --accent-fail: #ff6b6b;
      --text: #e8eaf0;
      --text2: #8a93a8;
      --radius: 12px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      padding: 40px 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 {
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 800;
    }
    h1 span { color: var(--accent-pass); }
    .summary-badge {
      background: var(--surface);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
    }
    .test-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.2s;
    }
    .test-card:hover {
      border-color: rgba(255,255,255,0.15);
    }
    .test-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .test-name {
      font-size: 15px;
      font-weight: 600;
    }
    .test-desc {
      font-size: 12px;
      color: var(--text2);
    }
    .test-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .test-status.pass {
      color: var(--accent-pass);
    }
    .test-status.fail {
      color: var(--accent-fail);
    }
    .error-log {
      background: rgba(255,107,107,0.05);
      border: 1px solid rgba(255,107,107,0.2);
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 11px;
      color: var(--accent-fail);
      white-space: pre-wrap;
      width: 100%;
    }
    .test-container {
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <header>
    <h1>Journe<span>lyst Tests</span></h1>
    <div class="summary-badge" id="summary-badge">Running tests...</div>
  </header>
  <main id="test-list" class="test-container"></main>

  <!-- Load mock DOM requirements for scripts -->
  <div id="map" style="display:none"></div>
  <div id="welcome-card" style="display:none"></div>
  <div id="trips-grid" style="display:none"></div>
  <div id="trip-count-badge" style="display:none"></div>
  <div id="filter-viewport" style="display:none"></div>

  <!-- Load dependencies & code under test -->
  <script>
    // Leaflet Mock to satisfy map.js and processing.js load dependencies
    window.L = {
      layerGroup: () => ({ addTo: () => ({ clearLayers: () => {}, addLayer: () => {} }) }),
      map: () => ({ on: () => {}, getContainer: () => ({ querySelector: () => true }) })
    };
  </script>
  <script src="../js/state.js"></script>
  <script src="../js/helpers.js"></script>
  <script src="../js/processing.js"></script>
  <script src="tests.js"></script>
</body>
</html>
